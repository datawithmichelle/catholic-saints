<!DOCTYPE html>

<head>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #0F0A1E;
            font-family: 'Lato', sans-serif;
            color: #E8D5A3;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: #1A0F2E;
            border-radius: 16px;
            padding: 36px 40px;
            max-width: 780px;
            width: 100%;
            border: 1px solid #2A1845;
        }

        /* ── Navigation ── */
        .nav {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2A1845;
        }

        .nav a {
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            color: #9B7FBF;
            transition: color 0.2s;
        }

        .nav a:hover { color: #C9A84C; }
        .nav a.active { color: #C9A84C; border-bottom: 1px solid #C9A84C; padding-bottom: 2px; }

        /* ── Header ── */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            color: #C9A84C;
            text-align: center;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .divider {
            text-align: center;
            color: #C9A84C;
            font-size: 14px;
            letter-spacing: 0.4em;
            margin-bottom: 24px;
        }

        /* ── Search input ── */
        .search-wrap {
            position: relative;
            margin-bottom: 8px;
        }

        .search-input {
            width: 100%;
            background: #2A1845;
            border: 1px solid #4A3060;
            border-radius: 6px;
            padding: 12px 16px;
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            color: #E8D5A3;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input::placeholder { color: #5A4070; }
        .search-input:focus { border-color: #C9A84C; }

        /* ── Result count ── */
        .result-count {
            font-size: 11px;
            color: #5A4070;
            letter-spacing: 0.1em;
            text-align: right;
            margin-bottom: 16px;
            min-height: 16px;
        }

        /* ── Results grid ── */
        .results { display: flex; flex-direction: column; gap: 12px; }

        /* ── Single result card ── */
        .result-card {
            background: #2A1845;
            border: 1px solid #4A3060;
            border-radius: 10px;
            padding: 16px 20px;
        }

        .result-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 10px;
        }

        .result-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .result-cross {
            width: 60px;
            height: 60px;
            background: #1A0F2E;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #C9A84C;
            flex-shrink: 0;
        }

        .result-info { flex: 1; }

        .result-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: #E8D5A3;
            margin-bottom: 4px;
        }

        /* ── Patronage tags ── */
        .patronage-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .tag {
            background: #1A0F2E;
            border: 1px solid #4A3060;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 10px;
            color: #9B7FBF;
            letter-spacing: 0.08em;
        }

        .tag.match {
            border-color: #C9A84C;
            color: #C9A84C;
        }

        .result-desc {
            font-size: 13px;
            color: #C5B08A;
            line-height: 1.7;
        }

        /* ── Empty state ── */
        .empty {
            text-align: center;
            color: #5A4070;
            font-size: 13px;
            font-style: italic;
            padding: 40px 0;
        }

        /* ── Hint text ── */
        .hint {
            text-align: center;
            color: #5A4070;
            font-size: 12px;
            letter-spacing: 0.05em;
            padding: 30px 0;
        }

        .credit {
            text-align: center;
            font-size: 10px;
            color: #3D2A5A;
            letter-spacing: 0.1em;
            margin-top: 24px;
            padding-top: 14px;
            border-top: 1px solid #2A1845;
        }

        @media (max-width: 580px) {
            .card { padding: 24px 20px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>

    // ── Search handler ────────────────────────────────────────────────────────
    function handleSearch() {
        const query = document.getElementById('search-input').value.trim().toLowerCase();
        const resultsEl = document.getElementById('results');
        const countEl = document.getElementById('result-count');

        // Show hint if query is empty
        if (!query) {
            resultsEl.innerHTML = '<div class="hint">Type a word to find your patron saint ✦</div>';
            countEl.textContent = '';
            return;
        }

        // Filter saints whose patronages include the query
        const matches = SAINTS.filter(s =>
            s.patronages.some(p => p.toLowerCase().includes(query))
        );

        // Update result count
        countEl.textContent = matches.length > 0
            ? `${matches.length} saint${matches.length > 1 ? 's' : ''} found`
            : '';

        // No results
        if (matches.length === 0) {
            resultsEl.innerHTML = `<div class="empty">No patron saint found for "${query}" :( Try a different word.</div>`;
            return;
        }

        // Build result cards
        resultsEl.innerHTML = matches.map(saint => {
            // Image or cross placeholder
            const imgHTML = saint.image
                ? `<img class="result-img" src="${saint.image}" alt="${saint.name}" onerror="this.outerHTML='<div class=\\'result-cross\\'>✝</div>'">`
                : `<div class="result-cross">✝</div>`;

            // Highlight matched tags
            const tagsHTML = saint.patronages.map(p => {
                const isMatch = p.toLowerCase().includes(query);
                return `<span class="tag ${isMatch ? 'match' : ''}">${p}</span>`;
            }).join('');

            return `
                <div class="result-card">
                    <div class="result-header">
                        ${imgHTML}
                        <div class="result-info">
                            <div class="result-name">${saint.name}</div>
                            <div class="patronage-tags">${tagsHTML}</div>
                        </div>
                    </div>
                    <div class="result-desc">${saint.description}</div>
                </div>`;
        }).join('');
    }
